AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  NyaayaSetu AI - Auth Lambda backend with DynamoDB and API Gateway

Globals:
  Function:
    Runtime: python3.11
    Timeout: 10
    MemorySize: 256
    Environment:
      Variables:
        DYNAMODB_TABLE_USERS: Users
        JWT_SECRET: ${self:custom.JwtSecret}

Parameters:
  JwtSecret:
    Type: String
    Description: Secret used to sign JWTs (provide via parameter store or CLI)
    Default: fallback-secret

Resources:
  UsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Users
      AttributeDefinitions:
        - AttributeName: email
          AttributeType: S
      KeySchema:
        - AttributeName: email
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST

  AuthFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: NyaayaSetuAuthLambda
      Handler: backend/lambda/auth_lambda.lambda_handler
      CodeUri: .
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
      Events:
        Api:
          Type: Api
          Properties:
            Path: /auth/{proxy+}
            Method: ANY
            RestApiId: !Ref ApiGateway

  ApiGateway:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Cors:
        AllowOrigin: '*'
        AllowHeaders: '*'
        AllowMethods: '*'
      DefinitionBody:
        swagger: '2.0'
        info:
          title: NyaayaSetu Auth API
          version: '1.0'
        paths:
          /auth/signup:
            post:
              x-amazon-apigateway-integration:
                uri:
                  Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${AuthFunction.Arn}/invocations
                httpMethod: POST
                type: aws_proxy
          /auth/login:
            post:
              x-amazon-apigateway-integration:
                uri:
                  Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${AuthFunction.Arn}/invocations
                httpMethod: POST
                type: aws_proxy
          /{proxy+}:
            any:
              x-amazon-apigateway-integration:
                uri:
                  Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${AuthFunction.Arn}/invocations
                httpMethod: ANY
                type: aws_proxy

Outputs:
  ApiEndpoint:
    Description: URL of the API Gateway endpoint
    Value: !Sub https://${ApiGateway}.execute-api.${AWS::Region}.amazonaws.com/prod
  AuthFunctionArn:
    Description: ARN of the Auth Lambda function
    Value: !GetAtt AuthFunction.Arn
